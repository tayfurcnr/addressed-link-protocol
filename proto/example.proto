syntax = "proto3";

package alp;

// ALP payload schema example.

// IMPORTANT:
// The ALP_MSG_ID comment below is used by the generation scripts to build
// the automatic MSG_ID -> message type registry.
// If this comment is missing, the message can still be serialized manually,
// but automatic payload decoding via alpcom registry will not work.
// ALP_MSG_ID: 0x0040
message ExamplePayload {
  uint32 device_index = 1;
  float value = 2;
}
